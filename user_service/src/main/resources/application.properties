spring.application.name=user_service
# 1. Server Configuration
server.port=8081
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# optional
springdoc.swagger-ui.path=/swagger
# 2. R2DBC Database Configuration (PostgreSQL Reactive)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/user_service
spring.r2dbc.username=postgres
spring.r2dbc.password=0608
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=20
logging.level.org.springframework.r2dbc.core=DEBUG
logging.level.org.springframework.data.r2dbc.core=DEBUG
# 3. Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
# Producer ???
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Consumer ???? ???????? ??? (Thesis Service-? ??????? ???????????)
spring.kafka.consumer.group-id=user-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# JSON mapping ?????? package-??? ????? ?????????
spring.kafka.producer.properties.spring.json.trusted.packages=*
app.kafka.topic.user-created=user-created-events

# 4. Security
app.security.jwt.secret=${TMS_JWT_SECRET:tms-local-development-secret-key-please-change}
app.security.jwt.issuer=tms-user-service
app.security.jwt.expiration-minutes=120

# 4. Jackson (JSON) Formatting
spring.jackson.default-property-inclusion=non_null

# 5. Logging (Troubleshooting-? ????????)
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.reactor.kafka=INFO
