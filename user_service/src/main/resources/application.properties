spring.application.name=user_service
# 1. Серверийн тохиргоо
server.port=8081
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Swagger UI зам (localhost:8081/swagger)
springdoc.swagger-ui.path=/swagger
# 2. R2DBC Өгөгдлийн сангийн тохиргоо (PostgreSQL реактив)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/user_service
spring.r2dbc.username=postgres
spring.r2dbc.password=0608
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=20
logging.level.org.springframework.r2dbc.core=DEBUG
logging.level.org.springframework.data.r2dbc.core=DEBUG
# 3. Kafka тохиргоо
spring.kafka.bootstrap-servers=localhost:9092
# Producer (мэдээллийг илгэх) тохиргоо
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Consumer (мэдээ хүлээн авах) тохиргоо
spring.kafka.consumer.group-id=user-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# JSON mapping-д итгэх package-ууд
spring.kafka.producer.properties.spring.json.trusted.packages=*
app.kafka.topic.user-created=user-created-events # Хэрэглэгч үүссэн event-ийн topic

# 4. JWT Аюулгүй байдлын тохиргоо
app.security.jwt.secret=${TMS_JWT_SECRET:tms-local-development-secret-key-please-change} # Нууц түлхүүр (gateway-тэй ижил)
app.security.jwt.issuer=tms-user-service   # Token үүсгэгч
app.security.jwt.expiration-minutes=120     # Token хүчинтэй хугацаа (минут)

# 5. Jackson (JSON) форматлах тохиргоо
spring.jackson.default-property-inclusion=non_null # null утгатай талбарыг JSON-д оруулахгүй

# 6. Лог тохиргоо (алдаа шалгахад ашиглах)
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.reactor.kafka=INFO
