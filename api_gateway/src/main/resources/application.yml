server:
  port: 8080

spring:
  application:
    name: api_gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:8080"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**,/api/auth/**

        - id: thesis-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/theses/**

        - id: workflow-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/workflows/**

        - id: evaluation-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/evaluations/**

        - id: grading-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/grades/**,/api/grading/**,/api/resolutions/**

        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**

        - id: report-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/reports/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt:
      secret: ${TMS_JWT_SECRET:tms-local-development-secret-key-please-change}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
